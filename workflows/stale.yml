name: 'Close stale issues and PRs'

on:
  schedule:
    - cron: '0 0 * * 1'  # 每周一运行

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: '此 Issue 已标记为 stale，因为 30 天内无活动。如果问题仍然存在，请回复此评论。'
          stale-pr-message: '此 PR 已标记为 stale，因为 30 天内无活动。'
          close-issue-message: '此 Issue 因长期无活动被自动关闭。'
          close-pr-message: '此 PR 因长期无活动被自动关闭。'
          days-before-stale: 30
          days-before-close: 7
          exempt-issue-labels: 'pinned,security,enhancement'
          exempt-pr-labels: 'pinned,work-in-progress'
